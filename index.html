<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYVERA Real Estate</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#070707;
color:white;
overflow-x:hidden;
background-image:radial-gradient(circle at top,#1a1a1a 0%,#070707 60%);
}

header{
background:rgba(0,0,0,0.85);
padding:20px 30px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(255,215,0,0.25);
position:sticky;
top:0;
z-index:100;
backdrop-filter:blur(10px);
}

.logo-box{
display:flex;
align-items:center;
gap:15px;
}

.logo-box img{
width:70px;
height:70px;
object-fit:contain;
}

.logo-box h1{
color:gold;
letter-spacing:4px;
font-size:28px;
}

.logo-box p{
font-size:13px;
color:#ccc;
}

.menu-btn{
font-size:30px;
color:gold;
cursor:pointer;
}

.sidebar{
position:fixed;
top:0;
right:-330px;
width:320px;
height:100%;
background:#111;
padding:25px;
transition:0.4s;
z-index:999;
overflow:auto;
box-shadow:-5px 0 20px rgba(0,0,0,0.5);
}

.sidebar.active{
right:0;
}

.close-btn{
font-size:26px;
color:gold;
cursor:pointer;
display:block;
margin-bottom:20px;
}

.sidebar h2{
text-align:center;
color:gold;
margin-bottom:20px;
}

.sidebar input,
.sidebar textarea{
width:100%;
padding:12px;
margin-bottom:12px;
background:#222;
border:none;
border-radius:10px;
color:white;
}

.sidebar button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:gold;
color:black;
font-weight:bold;
margin-bottom:10px;
cursor:pointer;
}

.admin-panel{
display:none;
margin-top:25px;
padding-top:20px;
border-top:1px solid #333;
}

.section{
padding:50px 20px;
max-width:1200px;
margin:auto;
}

.section-title{
text-align:center;
color:gold;
font-size:35px;
margin-bottom:40px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:linear-gradient(180deg,#171717,#101010);
border-radius:24px;
overflow:hidden;
transition:0.4s;
border:1px solid rgba(255,215,0,0.12);
box-shadow:0 10px 30px rgba(0,0,0,0.4);
position:relative;
}

.card:hover{
transform:translateY(-10px) scale(1.01);
box-shadow:0 20px 40px rgba(0,0,0,0.6);
border-color:rgba(255,215,0,0.4);
}

.card img{
width:100%;
height:240px;
object-fit:cover;
}

.card-content{
padding:18px;
}

.card-content h3{
margin-bottom:10px;
color:gold;
}

.card-content p{
margin-bottom:10px;
line-height:1.6;
color:#ddd;
}

.price{
font-size:22px;
font-weight:bold;
color:#00ffae;
margin-top:10px;
}

.btn{
display:inline-block;
margin-top:15px;
padding:10px 15px;
background:gold;
color:black;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

footer{
text-align:center;
padding:35px;
background:#050505;
margin-top:60px;
color:#999;
border-top:1px solid rgba(255,215,0,0.1);
}

.hero{
height:90vh;
background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?q=80&w=1600&auto=format&fit=crop') center/cover;
position:relative;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,0.5),rgba(0,0,0,0.85));
}

.hero-content{
position:relative;
z-index:2;
max-width:800px;
padding:20px;
}

.hero-content h1{
font-size:60px;
margin-bottom:20px;
color:white;
text-transform:uppercase;
letter-spacing:3px;
}

.hero-content p{
font-size:20px;
line-height:1.8;
color:#ddd;
margin-bottom:30px;
}

.hero-btn{
display:inline-block;
padding:14px 28px;
background:gold;
color:black;
text-decoration:none;
font-weight:bold;
border-radius:14px;
transition:0.3s;
}

.hero-btn:hover{
transform:scale(1.05);
}

@media(max-width:768px){

.hero-content h1{
font-size:36px;
}

.hero-content p{
font-size:16px;
}

}


</style>
</head>
<body>

<header>

<div class="menu-btn" onclick="openMenu()">☰</div>

<div class="logo-box">
<img src="logo.png">
<div>
<h1>KEYVERA</h1>
<p>REAL ESTATE BROKERAGE</p>
</div>
</div>

</header>

<div class="sidebar" id="sidebar">

<span class="close-btn" onclick="closeMenu()">✕</span>

<h2>Admin Login</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>

<div class="admin-panel" id="panel">

<h2>إضافة عقار</h2>

<input type="file" id="img">

<input id="title" placeholder="اسم العقار">

<input id="price" placeholder="السعر">

<input id="location" placeholder="الموقع">

<textarea id="desc" placeholder="الوصف"></textarea>

<button onclick="addProperty()">إضافة العقار</button>

</div>

</div>

<section class="hero">

<div class="hero-overlay"></div>

<div class="hero-content">
<h1>Luxury Real Estate In Egypt</h1>
<p>
اكتشف أفخم العقارات والاستثمارات العقارية مع KEYVERA
</p>
<a href="#list" class="hero-btn">تصفح العقارات</a>
</div>

</section>

<section class="section">

<h2 class="section-title">العقارات</h2>

<div class="cards" id="list"></div>

</section>

<footer>
© KEYVERA Real Estate Brokerage
</footer>

<script>

// FIREBASE CONFIG

// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAKPXEizMi2pIfRa9UWtGRyYQRBLVLJofY",
  authDomain: "keyvera-10001.firebaseapp.com",
  projectId: "keyvera-10001",
  storageBucket: "keyvera-10001.firebasestorage.app",
  messagingSenderId: "1064844982708",
  appId: "1:1064844982708:web:0ed5d079c6a6ae01ce1ae1",
  measurementId: "G-Q0M2MMFN4T"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// MENU

function openMenu(){

document.getElementById('sidebar').classList.add('active');

}

function closeMenu(){

document.getElementById('sidebar').classList.remove('active');

}

// LOGIN

function login(){

const email = document.getElementById('email').value;
const password = document.getElementById('password').value;

auth.signInWithEmailAndPassword(email,password)

.then(()=>{

alert('تم تسجيل الدخول');

document.getElementById('panel').style.display='block';

})

.catch((error)=>{

alert(error.message);

});

}

// LOGOUT

function logout(){

auth.signOut();

document.getElementById('panel').style.display='none';

}

// CHECK ADMIN

auth.onAuthStateChanged(user=>{

if(user){

document.getElementById('panel').style.display='block';

}else{

document.getElementById('panel').style.display='none';

}

});

// ADD PROPERTY

function addProperty(){

const file = document.getElementById('img').files[0];

if(!file){
alert('اختر صورة');
return;
}

const storageRef = storage.ref('properties/' + file.name);

storageRef.put(file)

.then(()=>{

storageRef.getDownloadURL()

.then((url)=>{

db.collection('properties').add({

title: document.getElementById('title').value,

price: document.getElementById('price').value,

location: document.getElementById('location').value,

desc: document.getElementById('desc').value,

image: url,

createdAt: Date.now()

});

alert('تم إضافة العقار');

});

});

}

// LOAD PROPERTIES

function loadProperties(){

 db.collection('properties')
.orderBy('createdAt','desc')
.onSnapshot((snapshot)=>{

const list = document.getElementById('list');

list.innerHTML='';

snapshot.forEach((doc)=>{

const data = doc.data();

list.innerHTML += `

<div class="card">

<img src="${data.image}">

<div class="card-content">

<h3>${data.title}</h3>

<p><b>الموقع:</b> ${data.location}</p>

<p>${data.desc}</p>

<div class="price">${data.price}</div>

<a class="btn" target="_blank"
href="https://wa.me/201206369219">
تواصل واتساب
</a>

</div>

</div>

`;

});

});

}

loadProperties();

</script>

</body>
</html>
