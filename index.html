<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KEYVERA Real Estate - Pro System</title><!-- Firebase --><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#0b0b0b;color:white;}
header{background:#000;padding:25px;text-align:center;border-bottom:1px solid gold;}
header img{width:90px;height:90px;object-fit:contain;margin-bottom:10px;}
header h1{color:gold;letter-spacing:5px;}
nav{background:#111;padding:12px;text-align:center;}
nav a{color:gold;margin:0 12px;text-decoration:none;font-weight:bold;}
.section{padding:50px 20px;max-width:1100px;margin:auto;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}
.card{background:#151515;border-radius:15px;overflow:hidden;}
.card img{width:100%;height:200px;object-fit:cover;}
.card-content{padding:15px;}
.price{color:#00ffae;font-weight:bold;margin-top:10px;}
.btn{display:inline-block;background:gold;color:#000;padding:8px 12px;border-radius:8px;text-decoration:none;margin-top:10px;}
.admin-bar{background:#111;padding:10px;display:flex;gap:10px;justify-content:center;position:sticky;top:0;}
.admin-bar input{padding:8px;border-radius:8px;border:none;background:#222;color:white;}
.admin-bar button{padding:8px 12px;background:gold;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
.admin-panel{display:none;background:#111;padding:20px;margin-top:20px;border-radius:15px;}
.admin-panel input,.admin-panel textarea{width:100%;padding:10px;margin-bottom:10px;border-radius:8px;border:none;background:#222;color:white;}
.admin-panel button{width:100%;padding:12px;background:gold;border:none;border-radius:8px;font-weight:bold;cursor:pointer;}
</style></head>
<body><header>
<img id="logo">
<h1>KEYVERA</h1>
<p>REAL ESTATE BROKERAGE</p>
</header><!-- ADMIN LOGIN --><div class="admin-bar">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="logout()">Logout</button>
</div><nav>
<a href="#properties">الشقق</a>
<a href="#admin">الإدارة</a>
</nav><section class="section" id="properties">
<h2 style="text-align:center;color:gold">العقارات</h2>
<div class="cards" id="list"></div>
</section><section class="section" id="admin">
<div class="admin-panel" id="panel">
<h3 style="color:gold;text-align:center">لوحة التحكم</h3>
<input type="file" id="img">
<input type="file" id="logoFile">
<input id="title" placeholder="العنوان">
<input id="price" placeholder="السعر">
<input id="location" placeholder="الموقع">
<textarea id="desc" placeholder="الوصف"></textarea>
<button onclick="add()">إضافة</button>
</div>
</section><script>

// Firebase Config (ضع بياناتك هنا)
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
appId: "YOUR_APP"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// AUTH
function login(){
const email = email.value;
const pass = password.value;
auth.signInWithEmailAndPassword(email,pass)
.then(()=>{
document.getElementById('panel').style.display='block';
alert('Logged in');
});
}

function logout(){auth.signOut();document.getElementById('panel').style.display='none';}

auth.onAuthStateChanged(user=>{
if(user){document.getElementById('panel').style.display='block';}else{document.getElementById('panel').style.display='none';}
});

// ADD PROPERTY
function add(){
const file = img.files[0];
const ref = storage.ref('images/'+file.name);
ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
db.collection('properties').add({
title:title.value,
price:price.value,
location:location.value,
desc:desc.value,
image:url
});
load();
});
});
}

// LOAD
function load(){
db.collection('properties').onSnapshot(snap=>{
list.innerHTML='';
snap.forEach(doc=>{
const d = doc.data();
list.innerHTML+=`
<div class="card">
<img src="${d.image}">
<div class="card-content">
<h3>${d.title}</h3>
<p>${d.location}</p>
<p>${d.desc}</p>
<div class="price">${d.price}</div>
<a class="btn" href="https://wa.me/201206369219">تواصل</a>
</div>
</div>`;
});
});
}

load();

// LOGO
logoFile.onchange=()=>{
const file = logoFile.files[0];
const ref = storage.ref('logo/'+file.name);
ref.put(file).then(()=>{
ref.getDownloadURL().then(url=>{
logo.src=url;
});
});
};

</script></body>
</html>
